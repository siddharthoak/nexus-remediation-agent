# Fixer Agent — Azure AI Foundry Hosted Agent definition
#
# All {{PLACEHOLDER}} values are substituted by scripts/update_agent.py at deploy time.
# Edit config.yaml (copied from config.yaml.example) to change any of these values —
# do not edit the placeholders in this file directly.
#
# IMPORTANT: Validate this file's schema against current AAF Hosted Agent documentation
# before deploying: https://learn.microsoft.com/en-us/azure/ai-foundry/agents/hosted-agents

name: nexus-fixer-agent
description: "Fetches Nexus IQ vulnerability reports, upgrades dependencies, fixes code breakage, and opens a GitHub PR."

container:
  image: "{{ACR_LOGIN_SERVER}}/fixer-agent:{{IMAGE_TAG}}"

trigger:
  schedule: "{{FIXER_SCHEDULE}}"

environment:
  # Pins the store/vulnerability-source backend selection explicitly rather than
  # relying on the "unset" fallback (Cosmos/NexusIQClient if COSMOS_ENDPOINT/
  # NEXUS_IQ_ENDPOINT happen to be set) — see PLAN.md section 4.4a.
  - name: DEPLOYMENT_MODE
    value: "azure"

  - name: NEXUS_IQ_ENDPOINT
    value: "{{NEXUS_IQ_ENDPOINT}}"

  - name: NEXUS_IQ_APP_PUBLIC_ID
    value: "{{NEXUS_IQ_APP_PUBLIC_ID}}"

  - name: GITHUB_REPO_TARGET
    value: "{{GITHUB_REPO_TARGET}}"

  - name: MODEL_DEPLOYMENT_NAME
    value: "{{MODEL_DEPLOYMENT_NAME}}"

  - name: COSMOS_ENDPOINT
    value: "{{COSMOS_ENDPOINT}}"

  - name: COSMOS_DATABASE
    value: "{{COSMOS_DATABASE}}"

  - name: COSMOS_CONTAINER
    value: "{{COSMOS_CONTAINER}}"

  - name: MAX_RETRY_ATTEMPTS
    value: "{{MAX_RETRY_ATTEMPTS}}"

  # OBS-02: Azure Monitor telemetry (agents/common/telemetry.py). Not a secret —
  # an App Insights connection string only permits *writing* telemetry, so this
  # follows the same "plain env var, not Key Vault" convention as COSMOS_ENDPOINT.
  # If this is left unset or blank, telemetry.py disables itself and logs an
  # error once — it never blocks or fails a fix run either way.
  - name: APPLICATIONINSIGHTS_CONNECTION_STRING
    value: "{{APPLICATIONINSIGHTS_CONNECTION_STRING}}"

  # Secrets — referenced from Key Vault, never hardcoded.
  # TODO: Confirm Key Vault reference syntax against current AAF Hosted Agent docs.
  - name: NEXUS_IQ_API_KEY
    secretRef:
      keyVaultUri: "{{KEY_VAULT_URI}}"
      secretName: "{{NEXUS_IQ_API_KEY_SECRET_NAME}}"

  - name: GITHUB_PAT
    secretRef:
      keyVaultUri: "{{KEY_VAULT_URI}}"
      secretName: "{{GITHUB_PAT_SECRET_NAME}}"

  # code_fixer.py and the inline Knowledge Agent both call anthropic.Anthropic(),
  # which reads this env var directly — required even though MODEL_DEPLOYMENT_NAME
  # names a model deployed inside the Foundry project (that name is passed as the
  # `model` argument to messages.create(); it does not by itself supply auth).
  - name: ANTHROPIC_API_KEY
    secretRef:
      keyVaultUri: "{{KEY_VAULT_URI}}"
      secretName: "{{ANTHROPIC_API_KEY_SECRET_NAME}}"

resources:
  cpu: 1
  memoryGb: 2

identity:
  type: SystemAssigned
